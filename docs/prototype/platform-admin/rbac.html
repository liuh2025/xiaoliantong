        .admin-breadcrumb span { color: var(--text-primary); }
        .admin-content { padding: var(--spacing-xl); }
        .rbac-layout { display: grid; grid-template-columns: 200px 1fr; gap: var(--spacing-xl); }
        .role-list { background: var(--bg-card); border-radius: var(--radius-lg); padding: var(--spacing-lg); box-shadow: var(--shadow-sm); }
        .role-item { padding: var(--spacing-md); border-radius: var(--radius-md); cursor: pointer; transition: all var(--transition-fast); margin-bottom: var(--spacing-xs); display: flex; align-items: center; gap: var(--spacing-sm); }

        .role-icon.operator { background: #3498db; }
        .role-icon.enterprise { background: #27ae60; }
        .role-icon.employee { background: #f39c12; }
        .role-icon.guest { background: #95a5a6; }

        .subsystem-block { margin-bottom: var(--spacing-xl); }
        .subsystem-title { font-weight: 600; font-size: 0.875rem; padding: var(--spacing-sm) var(--spacing-md); background: var(--bg-main); border-radius: var(--radius-md); margin-bottom: var(--spacing-md); display: flex; align-items: center; gap: var(--spacing-sm); }
        .subsystem-title .tag { font-size: 0.625rem; padding: 2px 6px; border-radius: 4px; font-weight: normal; }
        .tag-xlt { background: #e8f5e9; color: #27ae60; }
        .tag-ent { background: #e3f2fd; color: #2196f3; }
        .tag-admin { background: #fff3e0; color: #ff9800; }
        .module-block { margin-bottom: var(--spacing-lg); padding-left: var(--spacing-md); }
        .module-title { font-weight: 500; font-size: 0.8125rem; color: var(--text-secondary); margin-bottom: var(--spacing-sm); padding-left: var(--spacing-sm); border-left: 2px solid var(--primary); }

        .perm-table td { padding: var(--spacing-xs) var(--spacing-md); border-bottom: 1px solid var(--border-light); vertical-align: middle; }
        .perm-table tr:last-child td { border-bottom: none; }
        .perm-table .checkbox-col { width: 40px; text-align: center; }
        .perm-table .checkbox-col input { width: 16px; height: 16px; cursor: pointer; }
        .perm-table .name-col { width: 180px; }
        .perm-table .api-col { font-family: monospace; font-size: 0.75rem; color: var(--text-muted); word-break: break-all; }
        .perm-table .check-icon { color: #27ae60; font-weight: bold; }
        .perm-table .cross-icon { color: #e0e0e0; }
        .note-text { font-size: 0.75rem; color: var(--text-muted); font-style: italic; }

</head>

        };

        function selectRole(roleId) {
            document.querySelectorAll('.role-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderPermissionPanel(roleId);
        }

        function hasPermission(roleId, item) {
            const rolePerm = permissionConfig[roleId];
            const p = rolePerm.permissions;

            // 超级管理员拥有所有权限
            if (p.xlt.includes('all') && p.ent.includes('all') && p.admin.includes('all')) return true;

            // 检查是否属于某个子系统
            if (item.perm === 'xlt') {
                if (p.xlt.includes('all')) return true;
                if (p.xlt.includes('view') && !item.name.includes('发布') && !item.name.includes('认领') && !item.name.includes('认证')) return true;
                return p.xlt.includes(item.id);
            }

            if (item.perm === 'ent') {
                if (p.ent.includes('all')) return true;
                if (p.ent.includes('view') && (item.name.includes('列表') || item.name.includes('详情'))) return true;
                return p.ent.includes(item.id);
            }

            if (item.perm === 'admin') {
                // 平台运营不能访问超级管理员专属
                if (item.superOnly && roleId !== 'super_admin') return false;
                if (p.admin.includes('all')) return true;
                if (item.subPerm && p.admin.includes(item.subPerm)) return true;
            }

            return false;
        }

        function renderPermissionPanel(roleId) {
            const config = permissionConfig[roleId];
            const panel = document.getElementById('permissionPanel');

            let html = `
                <div class="panel-header">
                    <h4>「${config.name}」- 功能权限矩阵</h4>
                    <button class="btn btn-primary btn-sm" onclick="showToast('权限配置已保存')">保存配置</button>
                </div>
            `;

            // 遍历子系统
            for (const [sysKey, sys] of Object.entries(permissionMatrix)) {
                html += `
                    <div class="subsystem-block">
                        <div class="subsystem-title">
                            ${sys.title}
                            <span class="tag tag-${sys.tag}">${sys.tag === 'xlt' ? '校链通' : sys.tag === 'ent' ? '企业工作台' : '管理后台'}</span>
                        </div>
                `;

                // 遍历模块
                for (const [modName, items] of Object.entries(sys.modules)) {
                    html += `
                        <div class="module-block">
                            <div class="module-title">${modName}</div>
                            <table class="perm-table">
                                <thead>
                                    <tr>
                                        <th class="checkbox-col"></th>
                                        <th class="name-col">功能</th>
                                        <th>API URL</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;

                    for (const item of items) {
                        const checked = hasPermission(roleId, item);
                        const isDisabled = !checked && roleId === 'super_admin' ? '' : (roleId === 'platform_operator' && item.superOnly ? 'disabled' : '');
                        const checkIcon = checked ? '✓' : '○';
                        const iconClass = checked ? 'check-icon' : 'cross-icon';

                        html += `
                            <tr>
                                <td class="checkbox-col">
                                    <input type="checkbox" ${checked ? 'checked' : ''} ${isDisabled} onchange="showToast('配置已修改')">
                                </td>
                                <td class="name-col">
                                    <span class="${iconClass}">${checkIcon}</span>
                                    ${item.name}
                                    ${item.superOnly ? '<span style="color:#ff9800;font-size:0.625rem;margin-left:4px;">[超管]</span>' : ''}
                                </td>
                                <td class="api-col">${item.api}</td>
                            </tr>
                        `;
                    }

                    html += `
                                </tbody>
                            </table>
                        </div>
                    `;
                }

                html += `</div>`;
            }

            // 添加说明
            html += `
                <div style="margin-top:var(--spacing-lg);padding:var(--spacing-md);background:var(--bg-main);border-radius:var(--radius-md);font-size:0.75rem;color:var(--text-muted);">
                    <strong>说明：</strong>
                    <ul style="margin:8px 0 0 0;padding-left:20px;">
                        <li>消息通知API（站内信）根据当前登录用户的接收人自动过滤，无需配置</li>
                        <li>注册、登录、验证码等API为公共接口，无需配置</li>
                        <li><span style="color:#ff9800;">[超管]</span> 标记的API仅超级管理员可访问</li>
                        <li>功能权限配置保存在后端，前端仅做展示</li>
                    </ul>
                </div>
            `;

            panel.innerHTML = html;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show toast-success';
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 初始化
        renderPermissionPanel('enterprise_admin');
    </script>
</body>
</html>
